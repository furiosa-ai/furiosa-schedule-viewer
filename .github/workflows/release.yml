name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            linker: gcc-aarch64-linux-gnu
            strip: aarch64-linux-gnu-strip
          - target: aarch64-apple-darwin
            os: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches Cargo.toml version
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME#v}"
          crate="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')"
          if [ "$tag" != "$crate" ]; then
            echo "Tag v$tag does not match Cargo.toml version $crate" >&2
            exit 1
          fi

      - name: Install Rust
        run: rustup update stable && rustup target add ${{ matrix.target }}

      - name: Install cross linker
        if: matrix.linker != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.linker }}

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          bin="furiosa-schedule-viewer"
          dir="target/${{ matrix.target }}/release"
          strip_tool="${{ matrix.strip || 'strip' }}"
          "$strip_tool" "$dir/$bin" || true
          archive="${bin}-${version}-${{ matrix.target }}.tgz"
          tar czf "$archive" -C "$dir" "$bin"
          echo "ARCHIVE=$archive" >> "$GITHUB_ENV"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE }}
